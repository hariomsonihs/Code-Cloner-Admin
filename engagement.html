<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Engagement — Code Cloner Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
  <script src="/env-config.js"></script>
  <style> { background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:1rem; margin-bottom:.65rem; }
    .eng-head { display:flex; align-items:flex-start; gap:.75rem; margin-bottom:.6rem; }
    .eng-type-badge { display:inline-block; padding:.18rem .55rem; border-radius:999px; font-size:.72rem; font-weight:700; flex-shrink:0; }
    .tb-articles  { background:#dbeafe; color:#1d4ed8; }
    .tb-tips      { background:#fef9c3; color:#854d0e; }
    .tb-facts     { background:#dcfce7; color:#166534; }
    .tb-projects  { background:#f3e8ff; color:#6b21a8; }
    .tb-resources { background:#ffedd5; color:#9a3412; }
    .eng-title { font-weight:700; font-size:.92rem; color:var(--text); flex:1; min-width:0; }
    .reactions-row { display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:.6rem; }
    .react-chip { display:inline-flex; align-items:center; gap:.25rem; padding:.2rem .55rem; border-radius:999px; background:rgba(97,126,177,.08); border:1px solid var(--line); font-size:.78rem; font-weight:600; }
    .comments-section { border-top:1px solid var(--line); padding-top:.6rem; }
    .comment-row { display:flex; align-items:flex-start; gap:.6rem; padding:.4rem 0; border-bottom:1px solid rgba(97,126,177,.07); }
    .comment-row:last-child { border-bottom:none; }
    .comment-avatar-sm { width:28px; height:28px; border-radius:999px; background:linear-gradient(135deg,var(--brand),#3cc8a7); color:#fff; font-size:.72rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .comment-info { flex:1; min-width:0; }
    .comment-name-sm { font-weight:600; font-size:.8rem; color:var(--text); }
    .comment-time-sm { font-size:.7rem; color:var(--muted); margin-left:.35rem; }
    .comment-text-sm { font-size:.82rem; color:var(--muted); margin-top:.15rem; line-height:1.45; }
    .del-comment-btn { background:none; border:1px solid rgba(224,81,132,.25); border-radius:6px; padding:.18rem .45rem; font-size:.7rem; cursor:pointer; color:var(--red); transition:.15s; flex-shrink:0; }
    .del-comment-btn:hover { background:rgba(224,81,132,.1); }
    .no-engage { font-size:.82rem; color:var(--muted); padding:.4rem 0; }
    .filter-row { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .summary-chips { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .summary-chip { background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:.5rem .9rem; text-align:center; }
    .summary-chip .num { font-size:1.4rem; font-weight:700; font-family:"Space Grotesk",sans-serif; color:var(--brand); display:block; }
    .summary-chip .lbl { font-size:.72rem; color:var(--muted); }
  </style>
</head>
<body class="admin-root">
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><img src="/code_cloner_logo.jpeg" alt="Logo" class="brand-logo"/><div class="logo-text"><strong>Code Cloner</strong><small>Admin</small></div></div>
  <div class="sidebar-section">Navigation</div>
  <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard</a>
  <div class="sidebar-section">Content</div>
  <a href="articles.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Articles</a>
  <a href="tips.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Tips & Tricks</a>
  <a href="facts.html" class="nav-item"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Facts</a>
  <a href="projects.html" class="nav-item"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>Projects</a>
  <a href="resources.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>Resources</a>
  <div class="sidebar-section">Engagement</div>
  <a href="engagement.html" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Comments & Reactions</a>
  <div class="sidebar-section">Users</div>
  <a href="users.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>All Users</a>
  <div class="sidebar-section">Import</div>
  <a href="rss-import.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>RSS Import</a>
  <div class="sidebar-section">Site</div>
  <a href="../index.html" class="nav-item" target="_blank"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>View Site</a>
  <div class="sidebar-footer"><div class="user-chip"><div class="user-avatar" id="userAvatar">A</div><span class="user-email" id="userEmail"></span><button class="logout-btn" id="logoutBtn" title="Logout"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button></div></div>
</aside>

<div class="main-wrap">
  <header class="topbar">
    <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <span class="topbar-title">Comments &amp; Reactions</span>
  </header>

  <div class="page-body">

    <!-- Summary -->
    <div class="summary-chips" id="summaryChips">
      <div class="summary-chip"><span class="num" id="totalComments">—</span><div class="lbl">Total Comments</div></div>
      <div class="summary-chip"><span class="num" id="totalReactions">—</span><div class="lbl">Total Reactions</div></div>
      <div class="summary-chip"><span class="num" id="totalPosts">—</span><div class="lbl">Posts with Engagement</div></div>
    </div>

    <!-- Filters -->
    <div class="filter-row">
      <select class="select" id="typeFilter" style="max-width:180px">
        <option value="all">All Types</option>
        <option value="articles">Articles</option>
        <option value="tips">Tips</option>
        <option value="facts">Facts</option>
        <option value="projects">Projects</option>
        <option value="resources">Resources</option>
      </select>
      <select class="select" id="sortFilter" style="max-width:180px">
        <option value="comments">Most Comments</option>
        <option value="reactions">Most Reactions</option>
      </select>
      <input class="input" id="searchFilter" placeholder="Search by title..." style="max-width:260px"/>
    </div>

    <div class="card">
      <div class="card-head">
        <h2>All Posts with Engagement</h2>
        <span class="badge badge-blue" id="engCount">Loading...</span>
      </div>
      <div id="engList"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

const cfg = window.__env || {};
if (!cfg.projectId) {
  document.getElementById("engList").innerHTML = `<div style="border:1px dashed red;border-radius:12px;padding:1.5rem;text-align:center;color:red;font-size:.88rem">⚠️ Firebase config load nahi hua (window.__env missing). Locally test kar rahe ho? env-config.js manually check karo.</div>`;
  document.getElementById("engCount").textContent = "Error";
  throw new Error("window.__env not loaded — projectId missing");
}
const app = initializeApp(cfg);
const db  = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, user => {
  if (!user) { location.href = "index.html"; return; }
  document.getElementById("userEmail").textContent = user.email;
  document.getElementById("userAvatar").textContent = user.email[0].toUpperCase();
  document.body.classList.add("ready");
  loadAll();
});
document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth).then(() => location.href = "index.html"));
const sidebar = document.getElementById("sidebar"), overlay = document.getElementById("sidebarOverlay");
document.getElementById("hamburger").addEventListener("click", () => { sidebar.classList.toggle("open"); overlay.classList.toggle("show"); });
overlay.addEventListener("click", () => { sidebar.classList.remove("open"); overlay.classList.remove("show"); });

function toast(msg, type="success") {
  let w = document.getElementById("tw");
  if (!w) { w = document.createElement("div"); w.id="tw"; w.className="toast-wrap"; document.body.appendChild(w); }
  const el = document.createElement("div"); el.className=`toast toast-${type}`; el.textContent=msg;
  w.appendChild(el); setTimeout(() => el.remove(), 3000);
}

function esc(t) { return String(t??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }


const TYPES = ["articles","tips","facts","projects","resources"];
let allEngData = [];

async function loadAll() {
  document.getElementById("engList").innerHTML = `<div style="border:1px dashed var(--line);border-radius:12px;padding:1.5rem;text-align:center;color:var(--muted);font-size:.88rem">Loading...</div>`;
  document.getElementById("engCount").textContent = "Loading...";
  const results = [];

  // Test Firestore connectivity first
  try {
    await getDocs(collection(db, "articles"));
  } catch(e) {
    document.getElementById("engList").innerHTML = `<div style="border:1px dashed red;border-radius:12px;padding:1.5rem;color:red;font-size:.88rem">
      <strong>⚠️ Firestore Access Error:</strong> ${e.message}<br><br>
      <strong>Fix:</strong> Firebase Console → Firestore → Rules mein admin read access allow karo.
    </div>`;
    document.getElementById("engCount").textContent = "Error";
    return;
  }

  for (const t of TYPES) {
    try {
      const snap = await getDocs(collection(db, t));
      console.log(`[Engagement] ${t}: ${snap.size} docs found`);
      for (const d of snap.docs) {
        const data = d.data();
        const reactions = data.reactions || {};
        const totalReactions = Object.values(reactions).reduce((a,b) => a + (Number(b)||0), 0);
        let comments = [];
        try {
          const commSnap = await getDocs(collection(db, t, d.id, "comments"));
          comments = commSnap.docs
            .map(c => ({ id: c.id, ...c.data() }))
            .sort((a,b) => (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0));
          if (commSnap.size > 0) console.log(`[Engagement] ${t}/${d.id}: ${commSnap.size} comments, reactions:`, reactions);
        } catch(e) { console.error(`[Engagement] comments fetch failed for ${t}/${d.id}:`, e.message); }
        if (totalReactions > 0 || comments.length > 0) {
          results.push({
            id: d.id, type: t,
            title: data.title || data.name || "Untitled",
            reactions, totalReactions,
            comments, totalComments: comments.length,
          });
        }
      }
    } catch(e) { console.error(`[Engagement] failed to fetch collection "${t}":`, e.message); }
  }

  allEngData = results;
  console.log(`[Engagement] Total posts with engagement: ${results.length}`);
  document.getElementById("totalComments").textContent  = results.reduce((a,b) => a+b.totalComments, 0);
  document.getElementById("totalReactions").textContent = results.reduce((a,b) => a+b.totalReactions, 0);
  document.getElementById("totalPosts").textContent     = results.length;
  if (!results.length) {
    console.warn("[Engagement] No engagement found. Possible reasons: 1) No user has reacted/commented yet. 2) Firestore rules blocking read. 3) Data saved in different collection names.");
  }
  renderList(results);
}

function renderList(data) {
  const list = document.getElementById("engList");
  document.getElementById("engCount").textContent = data.length + " posts";
  if (!data.length) {
    list.innerHTML = `<div style="border:1px dashed var(--line);border-radius:12px;padding:1.5rem;text-align:center;color:var(--muted);font-size:.88rem">No engagement data yet. Comments and reactions will appear here once users interact.</div>`;
    return;
  }
  const typeIcon   = { articles:"&#128196;", tips:"&#128161;", facts:"&#128269;", projects:"&#128640;", resources:"&#128279;" };
  const typeLabel  = { articles:"Articles",  tips:"Tips",      facts:"Facts",     projects:"Projects",  resources:"Resources" };
  const reactEmoji = { like:"&#128077;", love:"&#10084;", fire:"&#128293;", mind:"&#129327;", clap:"&#128079;" };

  list.innerHTML = data.map(item => {
    const reactHtml = Object.entries(item.reactions)
      .filter(([,v]) => v > 0)
      .map(([k,v]) => `<span style="display:inline-flex;align-items:center;gap:.25rem;padding:.2rem .55rem;border-radius:999px;background:rgba(97,126,177,.08);border:1px solid var(--line);font-size:.78rem;font-weight:600">${reactEmoji[k]||k} ${v}</span>`)
      .join("");

    const commHtml = item.comments.map(c => {
      const initials = (c.name||"A").split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
      const time = c.createdAt && c.createdAt.toDate
        ? new Intl.DateTimeFormat("en-IN",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}).format(c.createdAt.toDate())
        : "Just now";
      return `<div style="display:flex;align-items:flex-start;gap:.6rem;padding:.4rem 0;border-bottom:1px solid rgba(97,126,177,.07)">
        <div style="width:28px;height:28px;border-radius:999px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${esc(initials)}</div>
        <div style="flex:1;min-width:0">
          <span style="font-weight:600;font-size:.8rem;color:var(--text)">${esc(c.name||"Anonymous")}</span>
          <span style="font-size:.7rem;color:var(--muted);margin-left:.35rem">${time}</span>
          <div style="font-size:.82rem;color:var(--muted);margin-top:.15rem;line-height:1.45">${esc(c.text||"")}</div>
        </div>
        <button onclick="deleteComment('${item.type}','${item.id}','${c.id}')" style="background:none;border:1px solid rgba(239,68,68,.25);border-radius:6px;padding:.18rem .45rem;font-size:.7rem;cursor:pointer;color:var(--red);flex-shrink:0">Delete</button>
      </div>`;
    }).join("");

    return `<div style="background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:1rem;margin-bottom:.65rem">
      <div style="display:flex;align-items:flex-start;gap:.75rem;margin-bottom:.6rem">
        <span style="display:inline-block;padding:.18rem .55rem;border-radius:999px;font-size:.72rem;font-weight:700;background:#dbeafe;color:#1d4ed8;flex-shrink:0">${typeIcon[item.type]||""} ${typeLabel[item.type]||item.type}</span>
        <div style="font-weight:700;font-size:.92rem;color:var(--text);flex:1;min-width:0">${esc(item.title)}</div>
        <a href="../read.html?type=${item.type}&id=${item.id}" target="_blank" style="font-size:.75rem;color:var(--brand);flex-shrink:0">Open &#8599;</a>
      </div>
      ${reactHtml ? `<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.6rem">${reactHtml}</div>` : ""}
      <div style="border-top:1px solid var(--line);padding-top:.6rem">
        <div style="font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem">Comments (${item.totalComments})</div>
        ${commHtml || `<div style="font-size:.82rem;color:var(--muted)">No comments yet.</div>`}
      </div>
    </div>`;
  }).join("");
}
window.deleteComment = async function(type, docId, commentId) {
  if (!confirm("Delete this comment?")) return;
  try {
    await deleteDoc(doc(db, type, docId, "comments", commentId));
    toast("Comment deleted ✓");
    loadAll();
  } catch(e) { toast("Error: "+e.message, "error"); }
};

function applyFilters() {
  const typeF   = document.getElementById("typeFilter").value;
  const sortF   = document.getElementById("sortFilter").value;
  const searchF = document.getElementById("searchFilter").value.toLowerCase();
  let filtered  = allEngData;
  if (typeF !== "all") filtered = filtered.filter(i => i.type === typeF);
  if (searchF) filtered = filtered.filter(i => i.title.toLowerCase().includes(searchF));
  filtered = [...filtered].sort((a,b) =>
    sortF === "reactions" ? b.totalReactions - a.totalReactions : b.totalComments - a.totalComments
  );
  renderList(filtered);
}

document.getElementById("typeFilter").addEventListener("change", applyFilters);
document.getElementById("sortFilter").addEventListener("change", applyFilters);
let debounce;
document.getElementById("searchFilter").addEventListener("input", () => { clearTimeout(debounce); debounce = setTimeout(applyFilters, 250); });
</script>
</body>
</html>
