<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Users — Code Cloner Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
  <script src="/env-config.js"></script>
  <style>
    .user-detail-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 1.2rem;
      margin-bottom: 1.2rem;
    }
    .user-detail-panel.open { display: block; }
    .user-detail-head {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1rem; flex-wrap: wrap;
    }
    .u-avatar {
      width: 52px; height: 52px; border-radius: 999px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      color: #fff; font-family: "Space Grotesk", sans-serif;
      font-size: 1.2rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .u-info { flex: 1; min-width: 0; }
    .u-info h3 { margin: 0 0 .15rem; font-size: 1rem; }
    .u-info p  { margin: 0; font-size: .8rem; color: var(--muted); }
    .u-stats {
      display: flex; flex-wrap: wrap; gap: .5rem; margin: .9rem 0;
    }
    .u-stat {
      background: rgba(79,110,247,.07); border: 1px solid rgba(79,110,247,.18);
      border-radius: 10px; padding: .45rem .8rem; text-align: center; min-width: 80px;
    }
    .u-stat strong { display: block; font-size: 1.1rem; color: var(--brand); }
    .u-stat span   { font-size: .72rem; color: var(--muted); }
    .history-scroll {
      display: flex; gap: .6rem; overflow-x: auto;
      padding-bottom: .4rem; scrollbar-width: none;
    }
    .history-scroll::-webkit-scrollbar { display: none; }
    .h-chip {
      flex: 0 0 auto; background: var(--surface);
      border: 1px solid var(--line); border-radius: 12px;
      padding: .55rem .85rem; font-size: .8rem; min-width: 160px;
      display: flex; flex-direction: column; gap: .2rem;
      text-decoration: none; color: inherit; transition: .18s;
    }
    .h-chip:hover { border-color: var(--brand); background: rgba(79,110,247,.05); }
    .h-chip .hc-type { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--brand); }
    .h-chip .hc-title { font-weight: 600; font-size: .82rem; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .h-chip .hc-date { font-size: .7rem; color: var(--muted); }
    .edit-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .9rem; padding-top: .9rem; border-top: 1px solid var(--line); }
    .edit-row .input { flex: 1; min-width: 160px; }
  </style>
</head>
<body class="admin-root">
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <img src="/code_cloner_logo.jpeg" alt="Logo" class="brand-logo"/>
    <div class="logo-text"><strong>Code Cloner</strong><small>Admin</small></div>
  </div>
  <div class="sidebar-section">Navigation</div>
  <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard</a>
  <div class="sidebar-section">Content</div>
  <a href="articles.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Articles</a>
  <a href="tips.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Tips & Tricks</a>
  <a href="facts.html" class="nav-item"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Facts</a>
  <a href="projects.html" class="nav-item"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>Projects</a>
  <a href="resources.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>Resources</a>
  <div class="sidebar-section">Users</div>
  <a href="users.html" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Users</a>
  <div class="sidebar-section">Site</div>
  <a href="../index.html" class="nav-item" target="_blank"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>View Site</a>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar" id="userAvatar">A</div>
      <span class="user-email" id="userEmail"></span>
      <button class="logout-btn" id="logoutBtn" title="Logout"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</aside>

<div class="main-wrap">
  <header class="topbar">
    <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <span class="topbar-title">👥 Users</span>
    <div class="topbar-actions">
      <span class="badge badge-blue" id="totalUsersCount">0 users</span>
    </div>
  </header>

  <div class="page-body">

    <!-- User Detail Panel -->
    <div class="user-detail-panel" id="userDetailPanel">
      <div class="user-detail-head">
        <div class="u-avatar" id="detailAvatar">?</div>
        <div class="u-info">
          <h3 id="detailName">—</h3>
          <p id="detailEmail"></p>
          <p id="detailPhone"></p>
          <p id="detailJoined"></p>
          <p style="font-size:.72rem;color:var(--muted);margin:.2rem 0 0" id="detailUid"></p>
        </div>
        <button class="btn btn-soft btn-sm" id="closeDetailBtn">✕ Close</button>
      </div>

      <!-- Stats -->
      <div class="u-stats" id="detailStats"></div>

      <!-- Reading History -->
      <div style="margin-top:.8rem">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;flex-wrap:wrap;gap:.4rem">
          <strong style="font-size:.88rem">📖 Reading History</strong>
          <div style="display:flex;gap:.4rem;flex-wrap:wrap" id="historyFilterBtns"></div>
        </div>
        <div class="history-scroll" id="detailHistory"></div>
        <button class="btn btn-danger btn-sm" id="clearHistoryBtn" style="margin-top:.8rem">🗑 Clear All History</button>
      </div>

      <!-- Edit Details -->
      <div class="edit-row">
        <input class="input" id="editName"  placeholder="Update name"/>
        <input class="input" id="editPhone" placeholder="Update phone"/>
        <button class="btn btn-primary btn-sm" id="saveEditBtn">💾 Save Changes</button>
      </div>
    </div>

    <!-- Users Table -->
    <div class="card">
      <div class="card-head">
        <h2>All Users <span id="userCount" class="badge badge-blue" style="margin-left:.4rem">0</span></h2>
        <input class="input" id="searchInput" placeholder="Search by name or email..." style="max-width:240px"/>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Phone</th>
              <th>Joined</th>
              <th>Total Read</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userList"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import {
  getFirestore, collection, getDocs, getDoc, doc,
  updateDoc, deleteDoc, query, orderBy, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

const cfg = window.__env || {};
const app  = initializeApp(cfg);
const db   = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, user => {
  if (!user) { window.location.href = "index.html"; return; }
  document.getElementById("userEmail").textContent = user.email;
  document.getElementById("userAvatar").textContent = user.email[0].toUpperCase();
  document.body.classList.add("ready");
  loadUsers();
});
document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth).then(() => location.href = "index.html"));

// Sidebar
const sidebar = document.getElementById("sidebar"), overlay = document.getElementById("sidebarOverlay");
document.getElementById("hamburger").addEventListener("click", () => { sidebar.classList.toggle("open"); overlay.classList.toggle("show"); });
overlay.addEventListener("click", () => { sidebar.classList.remove("open"); overlay.classList.remove("show"); });

function esc(t) { return String(t ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
function fmtDate(ts) {
  if (!ts) return "—";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"numeric" });
}

let allUsers = [];
let openUid  = null;
let allHistory = [];

// ── Load all users ──────────────────────────────────────────────────────────
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  allUsers = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
  document.getElementById("userCount").textContent       = allUsers.length;
  document.getElementById("totalUsersCount").textContent = allUsers.length + " users";
  renderTable(allUsers);
}

function renderTable(users) {
  const tbody = document.getElementById("userList");
  if (!users.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>No users found.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:.6rem">
          <div style="width:34px;height:34px;border-radius:999px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0">
            ${esc((u.name || u.email || "?")[0].toUpperCase())}
          </div>
          <div>
            <div class="td-title">${esc(u.name || "—")}</div>
            <div class="td-muted">${esc(u.email || "")}</div>
          </div>
        </div>
      </td>
      <td class="td-muted">${esc(u.phone || "—")}</td>
      <td class="td-muted">${fmtDate(u.createdAt)}</td>
      <td><span class="badge badge-blue" id="readCount-${u.uid}">...</span></td>
      <td>
        <button class="btn btn-primary btn-sm" onclick="openUser('${u.uid}')">View Details</button>
      </td>
    </tr>`).join("");

  // Load read counts async
  users.forEach(async u => {
    try {
      const hSnap = await getDocs(collection(db, "users", u.uid, "history"));
      const el = document.getElementById("readCount-" + u.uid);
      if (el) el.textContent = hSnap.size + " read";
    } catch { }
  });
}

// Search
document.getElementById("searchInput").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  renderTable(allUsers.filter(u => (u.name + u.email).toLowerCase().includes(q)));
});

// ── Open user detail ────────────────────────────────────────────────────────
window.openUser = async function(uid) {
  openUid = uid;
  const u = allUsers.find(x => x.uid === uid);
  if (!u) return;

  const panel = document.getElementById("userDetailPanel");
  panel.classList.add("open");
  panel.scrollIntoView({ behavior: "smooth", block: "start" });

  const initials = (u.name || u.email || "?").split(" ").map(w => w[0]).join("").toUpperCase().slice(0,2);
  document.getElementById("detailAvatar").textContent = initials;
  document.getElementById("detailName").textContent   = u.name || "—";
  document.getElementById("detailEmail").textContent  = "✉ " + (u.email || "");
  document.getElementById("detailPhone").textContent  = u.phone ? "📱 " + u.phone : "";
  document.getElementById("detailJoined").textContent = u.createdAt ? "📅 Joined " + fmtDate(u.createdAt) : "";
  document.getElementById("detailUid").textContent    = "UID: " + uid;
  document.getElementById("editName").value  = u.name  || "";
  document.getElementById("editPhone").value = u.phone || "";

  await loadUserHistory(uid);
};

document.getElementById("closeDetailBtn").addEventListener("click", () => {
  document.getElementById("userDetailPanel").classList.remove("open");
  openUid = null;
});

// ── Load user history ───────────────────────────────────────────────────────
async function loadUserHistory(uid, filterType = "all") {
  const snap = await getDocs(query(collection(db, "users", uid, "history"), orderBy("viewedAt", "desc")));
  allHistory = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  // Stats
  const types = ["articles","tips","facts","projects","resources"];
  const counts = {};
  types.forEach(t => counts[t] = allHistory.filter(h => h.type === t).length);
  const icons = { articles:"📄", tips:"💡", facts:"🔍", projects:"🚀", resources:"🔗" };

  document.getElementById("detailStats").innerHTML = `
    <div class="u-stat"><strong>${allHistory.length}</strong><span>Total Read</span></div>
    ${types.map(t => `<div class="u-stat" style="cursor:pointer" onclick="filterHistory('${t}')">
      <strong>${counts[t]}</strong><span>${icons[t]} ${t.charAt(0).toUpperCase()+t.slice(1)}</span>
    </div>`).join("")}`;

  // Filter buttons
  document.getElementById("historyFilterBtns").innerHTML = `
    <button class="btn btn-sm ${filterType==='all'?'btn-primary':'btn-soft'}" onclick="filterHistory('all')">All</button>
    ${types.map(t => `<button class="btn btn-sm ${filterType===t?'btn-primary':'btn-soft'}" onclick="filterHistory('${t}')">${icons[t]} ${t}</button>`).join("")}`;

  renderHistoryChips(filterType === "all" ? allHistory : allHistory.filter(h => h.type === filterType));
}

window.filterHistory = function(type) {
  if (!openUid) return;
  loadUserHistory(openUid, type);
};

function renderHistoryChips(items) {
  const container = document.getElementById("detailHistory");
  const icons = { articles:"📄", tips:"💡", facts:"🔍", projects:"🚀", resources:"🔗" };
  if (!items.length) {
    container.innerHTML = `<div class="empty-state" style="min-width:200px;padding:.8rem 1rem">No history found.</div>`;
    return;
  }
  container.innerHTML = items.map(h => `
    <a class="h-chip" href="../read.html?type=${h.type}&id=${h.contentId}" target="_blank">
      <span class="hc-type">${icons[h.type] || "📄"} ${h.type}</span>
      <span class="hc-title">${esc(h.title || "Untitled")}</span>
      <span class="hc-date">📅 ${fmtDate(h.viewedAt)}</span>
    </a>`).join("");
}

// ── Clear history ───────────────────────────────────────────────────────────
document.getElementById("clearHistoryBtn").addEventListener("click", async () => {
  if (!openUid || !confirm("Is user ki poori reading history delete karein?")) return;
  const snap = await getDocs(collection(db, "users", openUid, "history"));
  await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
  toast("History cleared ✓");
  await loadUserHistory(openUid);
});

// ── Save edits ──────────────────────────────────────────────────────────────
document.getElementById("saveEditBtn").addEventListener("click", async () => {
  if (!openUid) return;
  const name  = document.getElementById("editName").value.trim();
  const phone = document.getElementById("editPhone").value.trim();
  try {
    await updateDoc(doc(db, "users", openUid), { name, phone });
    // Update local cache
    const u = allUsers.find(x => x.uid === openUid);
    if (u) { u.name = name; u.phone = phone; }
    document.getElementById("detailName").textContent  = name || "—";
    document.getElementById("detailPhone").textContent = phone ? "📱 " + phone : "";
    renderTable(allUsers);
    toast("User updated ✓");
  } catch(e) { toast("Error: " + e.message, "error"); }
});

// ── Toast ───────────────────────────────────────────────────────────────────
function toast(msg, type = "success") {
  let w = document.getElementById("tw");
  if (!w) { w = document.createElement("div"); w.id = "tw"; w.className = "toast-wrap"; document.body.appendChild(w); }
  const icons = { success:`<svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>`, error:`<svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>` };
  const el = document.createElement("div");
  el.className = `toast toast-${type}`;
  el.innerHTML = (icons[type] || "") + msg;
  w.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}
</script>
</body>
</html>
