<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Media Library — Code Cloner Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
  <script src="/env-config.js"></script>
</head>
<body class="admin-root">
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <img src="/code_cloner_logo.jpeg" alt="Logo" class="brand-logo"/>
    <div class="logo-text"><strong>Code Cloner</strong><small>Admin</small></div>
  </div>
  <div class="sidebar-section">Navigation</div>
  <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard</a>
  <div class="sidebar-section">Content</div>
  <a href="articles.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Articles</a>
  <a href="tips.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Tips & Tricks</a>
  <a href="facts.html" class="nav-item"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Facts</a>
  <a href="projects.html" class="nav-item"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>Projects</a>
  <a href="resources.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>Resources</a>
  <div class="sidebar-section">Media</div>
  <a href="media.html" class="nav-item active"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Media Library</a>
  <div class="sidebar-section">Import</div>
  <a href="rss-import.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>RSS Import</a>
  <div class="sidebar-section">Engagement</div>
  <a href="engagement.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Comments & Reactions</a>
  <div class="sidebar-section">Users</div>
  <a href="users.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Users</a>
  <div class="sidebar-section">Site</div>
  <a href="../index.html" class="nav-item" target="_blank"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>View Site</a>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar" id="userAvatar">A</div>
      <span class="user-email" id="userEmail"></span>
      <button class="logout-btn" id="logoutBtn" title="Logout"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</aside>

<div class="main-wrap">
  <header class="topbar">
    <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <span class="topbar-title">🖼️ Media Library</span>
    <div class="topbar-actions">
      <button class="btn btn-primary btn-sm" id="uploadBtn"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Upload Images</button>
    </div>
  </header>

  <div class="page-body">
    <!-- UPLOAD FORM -->
    <div class="card" id="uploadCard" style="display:none;margin-bottom:1.2rem">
      <div class="card-head">
        <h2>📤 Upload to ImgBB & Save</h2>
        <button class="btn btn-soft btn-sm" id="cancelUploadBtn">Cancel</button>
      </div>
      <div class="form-grid">
        <div class="field full">
          <label>Select Image File(s) * <span style="font-weight:400;color:#888;font-size:.8rem">(Multiple files supported)</span></label>
          <input type="file" class="input" id="imageFile" accept="image/*" multiple/>
        </div>
        <div class="field"><label>Name Prefix <span style="font-weight:400;color:#888;font-size:.8rem">(optional)</span></label><input class="input" id="imgName" placeholder="e.g. hero-banner"/></div>
        <div class="field"><label>Category</label><input class="input" id="imgCategory" placeholder="e.g. Banners, Thumbnails"/></div>
        <div class="field full"><label>Tags (comma separated)</label><input class="input" id="imgTags" placeholder="javascript, tutorial, hero"/></div>
        <div class="field full"><label>Alt Text</label><input class="input" id="imgAlt" placeholder="Descriptive text"/></div>
      </div>
      <div class="action-row">
        <button class="btn btn-primary" id="saveImageBtn"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Upload & Save</button>
      </div>
      <div id="uploadProgress" style="display:none;margin-top:1rem">
        <div style="background:#e5e7eb;border-radius:999px;height:8px;overflow:hidden">
          <div id="progressBar" style="background:linear-gradient(90deg,#3cc8a7,#5f8eff);height:100%;width:0%;transition:width .3s"></div>
        </div>
        <p style="font-size:.82rem;color:var(--muted);margin-top:.4rem;text-align:center" id="progressText">Uploading...</p>
      </div>
    </div>

    <!-- MEDIA GALLERY -->
    <div class="card">
      <div class="card-head">
        <h2>All Images <span id="mediaCount" class="badge badge-blue" style="margin-left:.4rem">0</span></h2>
        <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
          <input class="input" id="searchInput" placeholder="Search..." style="max-width:220px"/>
          <select class="select" id="categoryFilter" style="max-width:160px"><option value="">All Categories</option></select>
        </div>
      </div>
      <div id="mediaGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;margin-top:1rem"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

const IMGBB_API_KEY = "fccbe0d61aa2c365cf710c34f0e8cd38";

const cfg = window.__env || {};
const app = initializeApp(cfg);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, user => {
  if (!user) { window.location.href = "index.html"; return; }
  document.getElementById("userEmail").textContent = user.email;
  document.getElementById("userAvatar").textContent = user.email[0].toUpperCase();
  document.body.classList.add("ready");
});
document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth).then(() => location.href = "index.html"));

const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("sidebarOverlay");
document.getElementById("hamburger").addEventListener("click", () => { sidebar.classList.toggle("open"); overlay.classList.toggle("show"); });
overlay.addEventListener("click", () => { sidebar.classList.remove("open"); overlay.classList.remove("show"); });

function esc(t){return String(t??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");}
function toast(msg,type="success"){
  let w=document.getElementById("tw"); if(!w){w=document.createElement("div");w.id="tw";w.className="toast-wrap";document.body.appendChild(w);}
  const icons={success:`<svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>`,error:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`};
  const t=document.createElement("div");t.className=`toast toast-${type}`;t.innerHTML=`${icons[type]||""}<span>${esc(msg)}</span>`;w.appendChild(t);
  setTimeout(()=>t.classList.add("show"),10);setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),300);},3000);
}

let allMedia=[];

document.getElementById("uploadBtn").addEventListener("click",()=>{
  document.getElementById("uploadCard").style.display="block";
  document.getElementById("imageFile").value="";
  document.getElementById("imgName").value="";
  document.getElementById("imgCategory").value="";
  document.getElementById("imgTags").value="";
  document.getElementById("imgAlt").value="";
});

document.getElementById("cancelUploadBtn").addEventListener("click",()=>{
  document.getElementById("uploadCard").style.display="none";
});

document.getElementById("saveImageBtn").addEventListener("click",async()=>{
  const files=document.getElementById("imageFile").files;
  if(!files.length){toast("Please select at least one image","error");return;}
  
  const namePrefix=document.getElementById("imgName").value.trim();
  const category=document.getElementById("imgCategory").value.trim()||"Uncategorized";
  const tags=document.getElementById("imgTags").value.trim();
  const alt=document.getElementById("imgAlt").value.trim();
  
  const btn=document.getElementById("saveImageBtn");
  const progress=document.getElementById("uploadProgress");
  const progressBar=document.getElementById("progressBar");
  const progressText=document.getElementById("progressText");
  
  btn.disabled=true;
  progress.style.display="block";
  
  try{
    for(let i=0;i<files.length;i++){
      const file=files[i];
      progressText.textContent=`Uploading ${i+1}/${files.length}: ${file.name}`;
      progressBar.style.width=`${(i/files.length)*100}%`;
      
      const form=new FormData();
      form.append("image",file);
      const res=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,{method:"POST",body:form});
      const json=await res.json();
      
      if(!json.success)throw new Error(json.error?.message||"Upload failed");
      
      const name=namePrefix?`${namePrefix}-${i+1}`:file.name;
      await addDoc(collection(db,"media"),{
        name,
        url:json.data.url,
        displayUrl:json.data.display_url,
        thumbUrl:json.data.thumb?.url||json.data.url,
        category,
        tags:tags?tags.split(",").map(t=>t.trim()).filter(Boolean):[],
        alt:alt||name,
        size:json.data.size,
        width:json.data.width,
        height:json.data.height,
        uploadedAt:serverTimestamp()
      });
    }
    
    progressBar.style.width="100%";
    progressText.textContent="Upload complete!";
    toast(`${files.length} image(s) uploaded successfully!`);
    
    setTimeout(()=>{
      document.getElementById("uploadCard").style.display="none";
      progress.style.display="none";
      progressBar.style.width="0%";
      btn.disabled=false;
    },1000);
  }catch(e){
    console.error("Upload error:",e);
    toast(e.message,"error");
    progress.style.display="none";
    btn.disabled=false;
  }
});

onSnapshot(query(collection(db,"media"),orderBy("uploadedAt","desc")),snap=>{
  allMedia=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderMedia();
  updateCategories();
});

function renderMedia(){
  const search=document.getElementById("searchInput").value.toLowerCase();
  const catFilter=document.getElementById("categoryFilter").value;
  
  let filtered=allMedia.filter(m=>{
    const matchSearch=!search||m.name?.toLowerCase().includes(search)||m.tags?.some(t=>t.toLowerCase().includes(search));
    const matchCat=!catFilter||m.category===catFilter;
    return matchSearch&&matchCat;
  });
  
  document.getElementById("mediaCount").textContent=filtered.length;
  const grid=document.getElementById("mediaGrid");
  
  if(!filtered.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#999">
      <svg viewBox="0 0 24 24" style="width:64px;height:64px;margin:0 auto 1rem;opacity:.3;stroke:currentColor;fill:none;stroke-width:2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <p>No images found</p>
    </div>`;
    return;
  }
  
  grid.innerHTML = filtered.map(m=>`
    <div class="media-card" style="border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;background:#fff">
      <div style="aspect-ratio:16/9;background:#f3f4f6;position:relative;overflow:hidden">
        <img src="${esc(m.thumbUrl||m.url)}" alt="${esc(m.alt||m.name)}" style="width:100%;height:100%;object-fit:cover"/>
      </div>
      <div style="padding:.75rem">
        <div style="font-weight:600;font-size:.85rem;margin-bottom:.3rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(m.name)}">${esc(m.name)}</div>
        <div style="font-size:.75rem;color:#888;margin-bottom:.5rem">${m.width}×${m.height} • ${(m.size/1024).toFixed(1)}KB</div>
        ${m.category?`<span class="badge badge-blue" style="font-size:.7rem">${esc(m.category)}</span>`:""}
        <div style="display:flex;gap:.4rem;margin-top:.6rem">
          <button class="btn btn-soft btn-sm" onclick="copyUrl('${esc(m.url)}')" style="flex:1;font-size:.75rem">📋 Copy URL</button>
          <button class="btn btn-soft btn-sm" onclick="deleteMedia('${m.id}')" style="color:#ef4444;font-size:.75rem">🗑️</button>
        </div>
      </div>
    </div>
  `).join("");
}

window.copyUrl=url=>{
  navigator.clipboard.writeText(url).then(()=>toast("URL copied!"));
};

window.deleteMedia=async id=>{
  if(!confirm("Delete this image?"))return;
  try{
    await deleteDoc(doc(db,"media",id));
    toast("Image deleted");
  }catch(e){
    toast(e.message,"error");
  }
};

function updateCategories(){
  const cats=[...new Set(allMedia.map(m=>m.category).filter(Boolean))];
  const sel=document.getElementById("categoryFilter");
  const current=sel.value;
  sel.innerHTML=`<option value="">All Categories</option>${cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("")}`;
  sel.value=current;
}

document.getElementById("searchInput").addEventListener("input",renderMedia);
document.getElementById("categoryFilter").addEventListener("change",renderMedia);
</script>
</body>
</html>
